name: CD - Render

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: cd-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy production
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push' &&
      github.event.workflow_run.head_branch == 'main')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: production

    steps:
      - name: Validate deploy hook secret
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$RENDER_DEPLOY_HOOK_URL" ]; then
            echo "::error::Missing secret RENDER_DEPLOY_HOOK_URL."
            echo "::error::Add it in GitHub: Settings > Secrets and variables > Actions."
            exit 1
          fi
          case "$RENDER_DEPLOY_HOOK_URL" in
            https://api.render.com/deploy/*) ;;
            *)
              echo "::error::RENDER_DEPLOY_HOOK_URL does not look like a Render deploy hook URL."
              exit 1
              ;;
          esac

      - name: Trigger Render deployment
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        run: |
          http_code=$(curl --silent --show-error \
            --retry 3 --retry-all-errors \
            --connect-timeout 10 --max-time 60 \
            --output /tmp/render_response.txt \
            --write-out "%{http_code}" \
            -X POST "$RENDER_DEPLOY_HOOK_URL")

          if [ "$http_code" -lt 200 ] || [ "$http_code" -ge 300 ]; then
            echo "::error::Render deploy hook failed with HTTP status $http_code."
            echo "Response body:"
            cat /tmp/render_response.txt
            exit 1
          fi

          echo "Render deployment accepted (HTTP $http_code)."
