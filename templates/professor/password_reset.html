{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>Professor Password Reset</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/footer.css' %}" />
</head>
<body class="bg-light">

<div class="container mt-5">
    <div class="card shadow p-4">
        <h4 class="mb-3">Reset Password (Staff Only)</h4>

        {% if form.errors %}
            <div class="alert alert-danger">
                {{ form.errors }}
            </div>
        {% endif %}

        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}

            <button type="submit" class="btn btn-primary w-100">
                Send Reset Link
            </button>
        </form>

        <div class="text-center mt-3">
            <a href="{% url 'professor_auth' %}">Back to Login</a>
        </div>
    </div>
</div>

  <footer class="global-footer">
    <div class="footer-content">
      <div class="footer-developed-by">DEVELOPED BY : SUN NEXUS SOLUTIONS</div>
      <div class="footer-university">SANDIP UNIVERSITY</div>
    </div>
  </footer>
</body>
</html>
